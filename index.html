<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mariage Johann & Nuria</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Inter',sans-serif;
background:
linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)),
url("https://www.transparenttextures.com/patterns/flowers.png");
background-size:300px;
}

.container{
background:white;
padding:60px;
border-radius:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
text-align:center;
width:420px;
max-width:90%;
border:1px solid rgba(198,168,107,0.3);
}

h1{
font-family:'Playfair Display',serif;
font-size:34px;
margin-bottom:5px;
color:#c6a86b;
}

.subtitle{
color:#888;
margin-bottom:10px;
}

.date{
color:#aaa;
margin-bottom:35px;
}

input{
width:85%;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#c6a86b;
box-shadow:0 0 8px rgba(198,168,107,0.3);
}

.result{
margin-top:30px;
font-size:22px;
opacity:0;
transform:translateY(20px);
transition:all 0.6s ease;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.gold{
color:#c6a86b;
font-weight:500;
}

.tablemates{
margin-top:25px;
font-size:16px;
color:#555;
text-align:left;
max-width:260px;
margin-left:auto;
margin-right:auto;
}

.tablemates ul{
padding-left:20px;
margin-top:10px;
}

.tablemates li{
margin-bottom:6px;
}

.tablemates li::marker{
color:#c6a86b;
}

.reset{
margin-top:20px;
padding:10px 18px;
border:none;
background:#c6a86b;
color:white;
border-radius:8px;
cursor:pointer;
font-size:14px;
display:none;
}

.reset:hover{
background:#b99750;
}

/* confettis */

.confetti{
position:fixed;
width:8px;
height:8px;
background:#c6a86b;
top:-10px;
opacity:0.8;
animation:fall 2s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Johann & Nuria</h1>
<div class="subtitle">Bienvenue à notre mariage</div>
<div class="date">3 avril 2026</div>

<input id="search" placeholder="Entrez votre nom">

<div id="result" class="result"></div>
<div id="mates" class="tablemates"></div>

<button id="reset" class="reset">Nouvelle recherche</button>

</div>

<script>

const tables = {

"6":["Tia Tania","Tia Julia","Tio Jota","Tonton Geraldo","Marie","Patrick","Tia Tanha","Tio Alex","Tia Carla","Tia Djena"],

"7":["Gaelle","Usher","Ashley","Isaiah","Victoria","Alexis","Elijah"],

"8":["Thaïs","Rayan","Anais","Lenira","Ivan","Marcio","Assia","Filipe","Adriano","Gerson"],

"9":["Emma","Victoire","Agnès","Oceane","Noah","Ana","Anthony","Ode","Maxence"],

"10":["Evangeliste Gianny","Helena","Laura","Naomi","Noemi","Oceanne","Priscillia","Sheryne","Laeticia","Cynthia"],

"11":["Enzo","Isaac","Guillith","Jordan","Esther","Joelle","Asayah","Manassé","Jackson","Anicia"],

"12":["Christopher","Aya","Mohammed","Dj Chris","Deejay 13"],

"13":["Tonton Alain","Tata Chantal","Marie Agathe","Marie Pascal","Kylian","Tonton Thierry","Tata Raissa","Everdy","Grace","Stephane"],

"14":["Maman Johann","Pierre","Stella","Peddy","Papa Johann","Axel","Ahcena","Lili","Massita","Charles"],

"18":["Jonathan","Naomie","Ronald","Silvio","Aby","Noemie Legendre","Tycia","Sarah Kibongui","Romuald","Anderson","Eldy"],

"19":["William","Aaron","Wildan","Tiphanie","Sandra","Nancy","Junior","Emeraude","Gerielle","Grace Julia","Yannis"],

"20":["Diaconesse Rosette","Diacre Larden","Shanice","Pasteur Deodat Babingui","Pasteure Lauriane Babingui","Pasteure Laure","Eline","Eliakim","Diacre Jacky","Diaconesse Mauly","Rose"],

"21":["Helea","Samantha","Kyslie","Maria K","Sarah K","Marie","Nacera","Stacy","Sephora","Aurelie"],

"22":["David","Jayce","Tony","Keellion","Leonel","Curtis","Mohamed Aziz","Nico","Kendy","Daniel","Clément"],

"24":["Andrea","Dylan","Edison","Emmanuel","Florian","Jean Jerry","Jeff","Leny","Milhane","Yannis","Ulrich"]

};

const input = document.getElementById("search");
const result = document.getElementById("result");
const mates = document.getElementById("mates");
const reset = document.getElementById("reset");

function confetti(){

for(let i=0;i<40;i++){

let c = document.createElement("div");
c.classList.add("confetti");
c.style.left = Math.random()*100+"vw";
c.style.animationDuration = (Math.random()*2+1)+"s";

document.body.appendChild(c);

setTimeout(()=>{c.remove()},2000);

}

}

input.addEventListener("input", function(){

let value = input.value.toLowerCase().trim();

for (let table in tables){

let found = tables[table].find(name =>
name.toLowerCase().includes(value)
);

if(found){

result.classList.remove("show");

setTimeout(()=>{

result.innerHTML =
"✨ Bienvenue <b>"+found+"</b><br>🍽️ Votre table : <span class='gold'>"+table+"</span>";

let others = tables[table].filter(n => n !== found);

mates.innerHTML =
"<br>À votre table il y a aussi :<ul><li>" +
others.join("</li><li>") +
"</li></ul>";

result.classList.add("show");

reset.style.display="inline-block";

confetti();

},100);

return;

}

}

result.innerHTML="";
mates.innerHTML="";
reset.style.display="none";
result.classList.remove("show");

});

reset.onclick = () => {

input.value="";
result.innerHTML="";
mates.innerHTML="";
reset.style.display="none";

}

</script>

</body>
</html>
