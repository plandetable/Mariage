<!DOCTYPE html>
<html lang="fr">
<head>

<title>Mariage Johann & Nuria</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ffffff,#f5f5f5);
font-family:'Inter',sans-serif;
}

.container{
background:white;
padding:60px;
border-radius:20px;
box-shadow:0 15px 50px rgba(0,0,0,0.08);
text-align:center;
width:420px;
max-width:90%;
}

h1{
font-family:'Playfair Display',serif;
font-size:34px;
margin-bottom:5px;
color:#c6a86b;
}

.date{
color:#999;
margin-bottom:35px;
}

input{
width:85%;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
outline:none;
transition:0.3s;
}

input:focus{
border-color:#c6a86b;
box-shadow:0 0 8px rgba(198,168,107,0.3);
}

.result{
margin-top:30px;
font-size:22px;
opacity:0;
transform:translateY(20px);
transition:all 0.6s ease;
}

.result.show{
opacity:1;
transform:translateY(0);
}

.tablemates{
margin-top:20px;

font-size:16px;

}
